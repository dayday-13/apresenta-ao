<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Apresentação</title>
  <style>
  body {
  margin: 0;
  font-family: 'Poppins', Arial, sans-serif;
  background: url('Colégio-Unidade-Polo-.jpeg') no-repeat center center fixed;
  background-size: cover;
  color: #fff;
  text-align: center;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  overflow-x: hidden;
}

    

    .logo-container {
      animation: fadeIn 2s ease-in-out;
    }

    .logo {
      width: 180px;
      border-radius: 50%;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
      animation: slideDown 1.5s ease-in-out;
    }

    .school-name {
      margin-top: 15px;
      font-size: 1.5em;
      font-weight: 600;
      text-shadow: 1px 1px 8px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 3em;
      margin-top: 40px;
      animation: pulse 2s infinite;
    }

    button {
      margin-top: 25px;
      padding: 15px 45px;
      font-size: 1.2em;
      border: none;
      border-radius: 30px;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #1f1c2c;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    button:hover {
      transform: scale(1.1);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .apresentacao {
      display: none;
      animation: slideUp 1.5s ease-in-out;
    }

    .links {
      margin-top: 30px;
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .links button {
      background: linear-gradient(135deg, #2575fc, #6a11cb);
      color: #fff;
      border-radius: 25px;
      padding: 12px 30px;
      font-weight: bold;
      transition: all 0.3s;
    }

    .links button:hover {
      background: #fff;
      color: #2575fc;
      transform: translateY(-5px);
    }

    .sobre-mim {
      display: none;
      margin-top: 25px;
      font-size: 1.1em;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 12px;
      max-width: 600px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes slideUp {
      from { transform: translateY(100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes slideDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>


  <div class="container" id="welcome">
    <h1>Bem-vindo!</h1>
    <button onclick="entrar()">Entrar</button>
  </div>

  <div class="apresentacao" id="apresentacao">
    <h1> Bem vindo!</h1>
    <p>Aqui você encontra meus links e contatos!</p>
    <div class="links">
      <button onclick="window.open('https://www.linkedin.com/in/dayellenn-fernanda-82a08830a', '_blank')">LinkedIn</button>
      <button onclick="window.open('https://dayday-13.github.io/portia/portia.html')">portifolio</button>
    </div>
    <button onclick="mostrarSobre()">Sobre mim</button>
    <div class="sobre-mim" id="sobre">
      <p>Olá visitante! Meu nome é Dayellenn Fernanda. Sou estudante no Colégio Unidade Polo e aqui compartilho meus projetos, portfólio e formas de contato. Seja bem-vindo(a)!</p>
    </div>
  </div>

  <script>
    function entrar() {
      document.getElementById('welcome').style.display = 'none';
      document.getElementById('apresentacao').style.display = 'block';
    }

    function mostrarSobre() {
      const sobre = document.getElementById('sobre');
      sobre.style.display = (sobre.style.display === 'none' || sobre.style.display === '') ? 'block' : 'none';
    }

    function irParaPortfolio() {
      window.location.href = "file:///C:/terceirao%202026/back%20end/INDEX.HTML";
    }
  </script>
</body>
</html>
